services:
  dashboard:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: garmin-dashboard:latest
    container_name: garmin-dashboard
    restart: unless-stopped
    env_file: .env
    environment:
      GARMINTOKENS: /data/tokens
      GARMIN_CACHE_DIR: /data/cache
      INFLUX_URL: http://influxdb:8086
      INFLUX_ORG: ${INFLUX_ORG:-garmin}
      INFLUX_BUCKET: ${INFLUX_BUCKET:-metrics}
      INFLUX_TOKEN: ${INFLUX_TOKEN:-garmin-admin-token}
    volumes:
      - ./tokens:/data/tokens
      - cache-data:/data/cache
    ports:
      - "${DASHBOARD_PORT:-8000}:8000"
    depends_on:
      influxdb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3

  influxdb:
    image: influxdb:2.7
    container_name: garmin-influxdb
    restart: unless-stopped
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: ${INFLUX_USER:-admin}
      DOCKER_INFLUXDB_INIT_PASSWORD: ${INFLUX_PASSWORD:-changeme123}
      DOCKER_INFLUXDB_INIT_ORG: ${INFLUX_ORG:-garmin}
      DOCKER_INFLUXDB_INIT_BUCKET: ${INFLUX_BUCKET:-metrics}
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: ${INFLUX_TOKEN:-garmin-admin-token}
    volumes:
      - influx-data:/var/lib/influxdb2
      - influx-config:/etc/influxdb2
    ports:
      - "${INFLUX_PORT:-8086}:8086"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8086/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  grafana:
    image: grafana/grafana:10.4.5
    container_name: garmin-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      INFLUX_TOKEN: ${INFLUX_TOKEN:-garmin-admin-token}
      INFLUX_ORG: ${INFLUX_ORG:-garmin}
      INFLUX_BUCKET: ${INFLUX_BUCKET:-metrics}
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    depends_on:
      influxdb:
        condition: service_healthy

volumes:
  cache-data:
  influx-data:
  influx-config:
  grafana-data:
