services:
  dashboard:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: garmin-dashboard:latest
    container_name: garmin-dashboard
    restart: unless-stopped
    env_file: .env
    environment:
      GARMINTOKENS: /data/tokens
    volumes:
      - ./tokens:/data/tokens
    ports:
      - "${DASHBOARD_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
