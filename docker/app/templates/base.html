<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{% block title %}Garmin Dashboard{% endblock %}</title>
<link rel="stylesheet" href="/static/styles.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
</head>
<body>
<aside class="sidebar">
  <h1>⌚ Garmin</h1>
  <nav>
    {% for key, label, href, icon in pages %}
    <a href="{{ href }}" class="{{ 'active' if active == key else '' }}">
      <span class="icon">{{ icon }}</span><span>{{ label }}</span>
    </a>
    {% endfor %}
  </nav>
  <div class="footer">v1.0 · MIT</div>
</aside>
<main class="main">
  {% block content %}{% endblock %}
</main>
</body>
</html>
